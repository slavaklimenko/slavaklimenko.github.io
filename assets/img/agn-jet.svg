<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Active galactic nucleus illustration</title>
  <desc id="desc">A glowing accretion disk around a compact center with two opposing jets.</desc>
  <defs>
    <radialGradient id="space" cx="50%" cy="44%" r="68%">
      <stop offset="0" stop-color="#164965"/>
      <stop offset=".52" stop-color="#0a263d"/>
      <stop offset="1" stop-color="#04111d"/>
    </radialGradient>
    <radialGradient id="core">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".22" stop-color="#dff6f4"/>
      <stop offset=".55" stop-color="#55c7c1" stop-opacity=".9"/>
      <stop offset="1" stop-color="#1b8c88" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="jet" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#dff6f4" stop-opacity="0"/>
      <stop offset=".62" stop-color="#72d7d1" stop-opacity=".75"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="disk" x1="0" x2="1">
      <stop stop-color="#176b87" stop-opacity=".2"/>
      <stop offset=".27" stop-color="#56cbc4"/>
      <stop offset=".5" stop-color="#ffffff"/>
      <stop offset=".73" stop-color="#56cbc4"/>
      <stop offset="1" stop-color="#176b87" stop-opacity=".2"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>
  <rect width="900" height="900" fill="url(#space)"/>
  <g fill="#ffffff">
    <circle cx="110" cy="116" r="2" opacity=".75"/><circle cx="776" cy="136" r="2.5" opacity=".8"/>
    <circle cx="150" cy="670" r="3" opacity=".55"/><circle cx="734" cy="730" r="2" opacity=".65"/>
    <circle cx="82" cy="414" r="1.5" opacity=".8"/><circle cx="835" cy="493" r="2" opacity=".65"/>
    <circle cx="280" cy="84" r="1.5" opacity=".5"/><circle cx="608" cy="814" r="2.5" opacity=".55"/>
  </g>
  <path d="M420 430 325 18 453 412Z" fill="url(#jet)" opacity=".65" filter="url(#soft)"/>
  <path d="M480 470 575 882 447 488Z" fill="url(#jet)" opacity=".65" filter="url(#soft)"/>
  <path d="M428 429 390 36 455 418Z" fill="#92e6df" opacity=".85"/>
  <path d="M472 471 510 864 445 482Z" fill="#92e6df" opacity=".85"/>
  <ellipse cx="450" cy="450" rx="302" ry="90" fill="none" stroke="#3fb7b0" stroke-width="38" opacity=".2" filter="url(#blur)" transform="rotate(-14 450 450)"/>
  <ellipse cx="450" cy="450" rx="300" ry="78" fill="none" stroke="url(#disk)" stroke-width="25" opacity=".9" transform="rotate(-14 450 450)"/>
  <ellipse cx="450" cy="450" rx="226" ry="48" fill="none" stroke="#ffffff" stroke-width="4" opacity=".56" transform="rotate(-14 450 450)"/>
  <ellipse cx="450" cy="450" rx="135" ry="32" fill="#02080d" transform="rotate(-14 450 450)"/>
  <circle cx="450" cy="450" r="118" fill="url(#core)" filter="url(#soft)"/>
  <circle cx="450" cy="450" r="43" fill="#02080d" stroke="#dff6f4" stroke-opacity=".4" stroke-width="3"/>
  <g fill="none" stroke="#75d8d2" opacity=".34">
    <circle cx="450" cy="450" r="360"/><circle cx="450" cy="450" r="390" stroke-dasharray="7 19"/>
  </g>
</svg>
