<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Two-peaked spectral energy distribution</title>
  <desc id="desc">A stylized plot with a synchrotron peak and a higher-energy inverse-Compton peak.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#0b2138"/><stop offset="1" stop-color="#123f56"/>
    </linearGradient>
    <linearGradient id="curve" x1="0" x2="1">
      <stop stop-color="#6bd8d1"/><stop offset=".5" stop-color="#ffffff"/><stop offset="1" stop-color="#6bd8d1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <g stroke="#ffffff" stroke-opacity=".1" stroke-width="1">
    <path d="M85 80V420M210 80V420M335 80V420M460 80V420M585 80V420M710 80V420"/>
    <path d="M85 120H730M85 220H730M85 320H730M85 420H730"/>
  </g>
  <g stroke="#dff6f4" stroke-width="3" fill="none">
    <path d="M85 65V420H745"/>
  </g>
  <path d="M95 395C150 380 165 220 250 180c74-35 120 30 141 98 26 86 56 96 93 48 45-59 56-196 144-218 68-17 93 72 105 228" fill="none" stroke="#57c8c1" stroke-width="18" stroke-opacity=".18" filter="url(#glow)"/>
  <path d="M95 395C150 380 165 220 250 180c74-35 120 30 141 98 26 86 56 96 93 48 45-59 56-196 144-218 68-17 93 72 105 228" fill="none" stroke="url(#curve)" stroke-width="7" stroke-linecap="round"/>
  <circle cx="250" cy="180" r="9" fill="#ffffff"/><circle cx="628" cy="108" r="9" fill="#ffffff"/>
  <g fill="#dff6f4" font-family="system-ui, sans-serif">
    <text x="195" y="140" font-size="25" font-weight="700">Synchrotron</text>
    <text x="563" y="72" font-size="25" font-weight="700">SSC</text>
    <text x="326" y="470" font-size="18" opacity=".75">frequency →</text>
    <text x="30" y="270" font-size="18" opacity=".75" transform="rotate(-90 30 270)">energy flux →</text>
  </g>
</svg>
